name: Scrape & Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape iiadil.framer.website
        run: |
          mkdir -p public
          wget --mirror --convert-links --adjust-extension --page-requisites --no-parent -e robots=off --timeout=60 --tries=3 --directory-prefix=public https://iiadil.framer.website/
          if [ -d "public/iiadil.framer.website" ]; then cp -r public/iiadil.framer.website/* public/ && rm -rf public/iiadil.framer.website; fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "scrape: mise a jour"
          git push
