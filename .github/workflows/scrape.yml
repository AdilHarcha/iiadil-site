name: Scrape & Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install puppeteer
        run: npm install puppeteer

      - name: Write scraper script
        run: |
          cat > scraper.mjs << 'EOF'
          import puppeteer from 'puppeteer';
          import fs from 'fs';
          import path from 'path';
          const BASE = 'https://iiadil.framer.website';
          const OUT = 'public';
          const visited = new Set();
          const queue = ['/'];
          const browser = await puppeteer.launch({ args: ['--no-sandbox','--disable-setuid-sandbox'] });
          while (queue.length > 0) {
            const p = queue.shift();
            if (visited.has(p)) continue;
            visited.add(p);
            console.log('Scraping:', BASE + p);
            const page = await browser.newPage();
            try {
              await page.goto(BASE + p, { waitUntil: 'networkidle2', timeout: 30000 });
              const html = await page.content();
              const out = path.join(OUT, p === '/' ? 'index.html' : p.replace(/\/$/, '') + '/index.html');
              fs.mkdirSync(path.dirname(out), { recursive: true });
              fs.writeFileSync(out, html);
              const links = await page.$$eval('a[href]', els => els.map(e => e.getAttribute('href')));
              for (const l of links) {
                if (l && l.startsWith('/') && !visited.has(l)) queue.push(l);
              }
            } catch(e) { console.error('Error:', e.message); }
            await page.close();
          }
          await browser.close();
          EOF

      - name: Run scraper
        run: node scraper.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "scrape: mise a jour"
          git push
